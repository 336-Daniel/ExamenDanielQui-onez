version: '3.8'
services:

  menu-db:
    image: postgres:16-alpine
    container_name: menu-db
    environment:
      POSTGRES_DB: menu_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Uisrael.
    ports:
      - "5433:5432"
    volumes:
      - menu-db-data:/var/lib/postgresql/data
    networks:
      - microservicios-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d menu_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  orders-db:
    image: postgres:16-alpine
    container_name: orders-db
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Uisrael.
    ports:
      - "5434:5432"
    volumes:
      - orders-db-data:/var/lib/postgresql/data
    networks:
      - microservicios-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d orders_db" ]
      interval: 10s
      timeout: 5s
      retries: 5



  menu-service:
    build:
      context: ./svc-menu
      dockerfile: Dockerfile
    container_name: menu-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://menu-db:5432/menu_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Uisrael.
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8081:8081"
    networks:
      - microservicios-network
    depends_on:
      menu-db:
        condition: service_healthy

  orders-service:
    build:
      context: ./svc-orders
      dockerfile: Dockerfile
    container_name: orders-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://orders-db:5432/orders_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Uisrael.
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8082:8082"
    networks:
      - microservicios-network
    depends_on:
      orders-db-db:
        condition: service_healthy
      menu-service:
        condition: service_started


  nginx-gateway:
    image: nginx:alpine
    container_name: nginx-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - microservicios-network
    depends_on:
      - menu-service
      - orders-service


volumes:
  menu-db-data:
#  loan-db-data:
networks:
  microservicios-network:
    driver: bridge


